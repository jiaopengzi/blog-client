# Description : CI/CD - 同步代码到 Gitee

name: Sync Gitee

on:
  push:
    branches:
      - main

  # 手动触发
  workflow_dispatch:

concurrency:
  group: blog-client-ci
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.GITEE_SSH_PRIVATE_KEY }}

      - name: Add Gitee host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H -t rsa gitee.com >> ~/.ssh/known_hosts

      # debug steps removed - environment is verified; proceeding to push

      - name: Push to Gitee
        run: |
          # 覆盖（先移除再添加），避免因已存在 remote 报错
          git remote remove gitee >/dev/null 2>&1 || true
          git remote add gitee git@gitee.com:jiaopengzi/blog-client.git
          # 抓取远端 main 的 refs，增加 --force-with-lease 成功概率
          git fetch gitee main --prune || true
          # 优先使用 --force-with-lease 保守推送；若失败，则仅对 main 使用 --force 覆盖（避免强制推送所有 refs）
          if git push --force-with-lease gitee main; then
            echo "push succeeded with --force-with-lease"
          else
            echo "--force-with-lease failed, falling back to --force for main"
            git push --force gitee main
          fi
