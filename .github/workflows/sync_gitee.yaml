# Description : CI/CD - 同步代码到 Gitee

name: Sync Gitee

on:
  push:
    branches:
      - main

  # 手动触发
  workflow_dispatch:

concurrency:
  group: blog-client-ci
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.GITEE_SSH_PRIVATE_KEY }}

      - name: Add Gitee host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H -t rsa gitee.com >> ~/.ssh/known_hosts

      - name: Debug SSH / git
        run: |
          echo '--- ssh-agent identities ---'
          ssh-add -l || true
          echo '--- ssh verbose test (BatchMode) ---'
          ssh -v -o BatchMode=yes -T git@gitee.com || true
          echo '--- git remote -v ---'
          git remote -v || true
          echo '--- current branch ---'
          git branch --show-current || true
          echo '--- ensure gitee remote exists (remove+add) ---'
          git remote remove gitee >/dev/null 2>&1 || true
          git remote add gitee git@gitee.com:jiaopengzi/blog-client.git || true
          echo '--- git remote -v (after add) ---'
          git remote -v || true
          echo '--- dry-run push via verbose SSH (no real push) ---'
          GIT_SSH_COMMAND="ssh -v -o BatchMode=yes -oStrictHostKeyChecking=no" git push --all gitee --dry-run || true

      - name: Push to Gitee
        run: |
          # 覆盖（先移除再添加），避免因已存在 remote 报错
          git remote remove gitee >/dev/null 2>&1 || true
          git remote add gitee git@gitee.com:jiaopengzi/blog-client.git
          # 确保本地获取到远端 refs，这样 --force-with-lease 才能正确检测是否安全覆盖
          git push --force-with-lease gitee main
