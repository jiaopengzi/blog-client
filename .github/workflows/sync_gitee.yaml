# Description : CI/CD - 同步代码到 Gitee

name: Sync Gitee

on:
  push:
    branches:
      - main

  # 手动触发
  workflow_dispatch:

concurrency:
  group: blog-client-ci
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.GITEE_SSH_PRIVATE_KEY }}

      - name: Add Gitee host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H -t rsa gitee.com >> ~/.ssh/known_hosts

      - name: Debug SSH / git
        run: |
          echo '--- ssh-agent identities ---'
          ssh-add -l || true
          echo '--- ssh verbose test (BatchMode) ---'
          ssh -v -o BatchMode=yes -T git@gitee.com || true
          echo '--- git remote -v ---'
          git remote -v || true
          echo '--- current branch ---'
          git branch --show-current || true
          echo '--- ensure gitee remote exists (remove+add) ---'
          git remote remove gitee >/dev/null 2>&1 || true
          git remote add gitee git@gitee.com:jiaopengzi/blog-client.git || true
          echo '--- git remote -v (after add) ---'
          git remote -v || true
          echo '--- dry-run push via verbose SSH (no real push) ---'
          GIT_SSH_COMMAND="ssh -v -o BatchMode=yes -oStrictHostKeyChecking=no" git push --all gitee --dry-run || true

      - name: Push to Gitee
        run: |
          set -x
          # 覆盖（先移除再添加），避免因已存在 remote 报错
          git remote remove gitee >/dev/null 2>&1 || true
          git remote add gitee git@gitee.com:jiaopengzi/blog-client.git
          # 启用 Git 跟踪和更详细的 SSH 日志，便于定位在 Runner 中是否阻塞
          export GIT_TRACE=1
          export GIT_CURL_VERBOSE=1
          export GIT_SSH_COMMAND="ssh -vvv -o BatchMode=yes -oStrictHostKeyChecking=no"
          # 先抓取远端 main 的 refs，增加 --force-with-lease 成功概率
          git fetch gitee main --prune || true
          # 优先使用 --force-with-lease 保守推送；若失败，则仅对 main 使用 --force 覆盖（避免强制推送所有 refs）
          if git push --force-with-lease gitee main; then
            echo "push succeeded with --force-with-lease"
          else
            echo "--force-with-lease failed, falling back to --force for main"
            git push --force gitee main
          fi
          echo "git push exit:$?"
