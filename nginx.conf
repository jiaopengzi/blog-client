worker_processes 1; # 设置工作进程数

events {
    worker_connections 1024; # 设置每个工作进程的最大连接数
}

http {
    include mime.types; # 包含 mime.types 文件
    default_type application/octet-stream; # 设置默认文件类型

    sendfile on; # 开启 sendfile
    keepalive_timeout 120; # 设置 keepalive 超时时间 120s

    gzip on; # 开启 gzip 压缩
    client_max_body_size 100M; # 设置上传文件大小限制为100MB

    # 配置服务器
    server {
        listen 80; # 监听端口
        listen [::]:80;
        server_name dev.jiaopengzi.com; # 设置服务器名称
        charset utf-8; # 设置编码

        location / {
            return 301 https://$host$request_uri; # 将所有 HTTP 请求重定向到 HTTPS
        }
    }

    server {
        listen 443 ssl;
        http2 on;
        listen [::]:443 ssl;
        http2 on;
        server_name dev.jiaopengzi.com; # 设置服务器名称
        charset utf-8; # 设置编码

        ssl_certificate /etc/nginx/ssl/jiaopengzi.com.pem; # SSL 证书路径
        ssl_certificate_key /etc/nginx/ssl/jiaopengzi.com.key; # SSL 证书密钥路径

        location / {
            root /usr/share/nginx/html; # 设置静态文件目录
            index index.html index.htm; # 设置默认索引文件
            try_files $uri $uri/ /index.html; # 在找不到请求的资源时返回单页应用的入口 HTML 文件
        }

        location /api/ {
            proxy_pass http://blog-server:5426/api/; # 使用 docker 服务名称 docker自定义网络
            proxy_http_version 1.1; # 设置 HTTP 版本
            proxy_set_header Upgrade $http_upgrade; # 设置升级头
            proxy_set_header Connection "upgrade"; # 设置连接头
            proxy_set_header Host $host; # 设置主机头
            proxy_set_header X-Real-IP $remote_addr; # 设置真实 IP 头
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; # 设置转发头
            proxy_read_timeout 600; # 设置代理读取超时时间
            proxy_connect_timeout 600; # 设置代理连接超时时间
            proxy_send_timeout 600; # 设置代理发送超时时间
        }
    }

    # 邮件服务器配置
    # 参考 https://docs.mailcow.email/post_installation/reverse-proxy/r_p-nginx/
    server {
        listen 80;
        listen [::]:80;
        server_name mail.jiaopengzi.com autodiscover.* autoconfig.*;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        http2 on;
        listen [::]:443 ssl;
        http2 on;
        server_name mail.jiaopengzi.com autodiscover.* autoconfig.*;

        ssl_certificate /etc/nginx/ssl/jiaopengzi.com.pem; # SSL 证书路径
        ssl_certificate_key /etc/nginx/ssl/jiaopengzi.com.key; # SSL 证书密钥路径
        ssl_session_timeout 1d;
        ssl_session_cache shared:SSL:50m;
        ssl_session_tickets off;

        ssl_protocols TLSv1.2;
        ssl_ciphers HIGH:!aNULL:!MD5:!SHA1:!kRSA;
        ssl_prefer_server_ciphers off;

        location /Microsoft-Server-ActiveSync {
            proxy_pass http://127.0.0.1:2080/Microsoft-Server-ActiveSync;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 75;
            proxy_send_timeout 3650;
            proxy_read_timeout 3650;
            proxy_buffers 64 512k;
            client_body_buffer_size 512k;
            client_max_body_size 0;
        }

        location / {
            proxy_pass http://127.0.0.1:2080/;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            client_max_body_size 0;
            proxy_buffer_size 128k;
            proxy_buffers 64 512k;
            proxy_busy_buffers_size 512k;
        }
    }
}
