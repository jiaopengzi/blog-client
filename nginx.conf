# 使用 docker 验证配置命令:
# sudo docker run --rm -v $(pwd)/nginx.conf:/etc/nginx/custom.conf nginx:1.31.2-alpine nginx -t -c /etc/nginx/custom.conf

# 匹配优先级说明(从高到低):
# (1)精确匹配, 示例: location = /abc { }
# (2)前缀匹配(不进行正则匹配)如果找到停止搜索, 示例: location ^~ /abc { }
# (3)正则匹配按顺序从上到下匹配
#   正则匹配，不区分大小写, 示例:  location ~* /abc { }
#   正则匹配，区分大小写写, 示例:  location ~ /abc { }
# (4)普通路径前缀匹配, 示例:  location /abc { }

# 设置工作进程数(根据 CPU 核心数自动设置, 提升并发能力)
worker_processes auto;

# 设置pid的路径, 确保在镜像中有权限写入 nginx.pid
pid /tmp/nginx.pid;

events {
    # 设置每个工作进程的最大连接数
    worker_connections 1024;

    # Linux下使用高性能 epoll 事件模型
    use epoll;

    # 一次接受多个新连接, 提高连接效率
    multi_accept on;
}

http {
    # 包含 mime.types 文件
    include mime.types;

    # 设置默认文件类型
    default_type application/octet-stream;

    # 开启 sendfile
    sendfile on;

    # 设置 keepalive 超时时间 120s
    keepalive_timeout 120;

    # 如果存在预压缩的 .gz 文件, 则直接提供该文件(需配置在 gzip on 之前)
    gzip_static on;

    # 开启 gzip 压缩
    gzip on;

    # 设置最小压缩文件大小为 1KB
    gzip_min_length 1024;

    # 设置 gzip 缓冲区大小
    gzip_buffers 4 16k;

    # 设置压缩级别(1-9), 数值越大压缩率越高但 CPU 占用也越高
    gzip_comp_level 6;

    # 设置需要压缩的文件类型
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # 告知代理服务器根据 Accept-Encoding 返回不同内容, 提升缓存兼容性
    gzip_vary on;

    # 对所有代理请求启用 gzip 压缩
    gzip_proxied any;

    # 设置上传文件大小限制为100MB
    client_max_body_size 100M;

    # 隐藏 Nginx 版本号, 防止信息泄露
    server_tokens off;

    # 添加基础安全头保护
    # 防止点击劫持(Clickjacking), 禁止页面被嵌入到 <iframe> 中(除非同源)
    add_header X-Frame-Options "SAMEORIGIN" always;

    # 启用浏览器内置的 XSS 过滤器(主要是旧版 IE/Chrome)
    add_header X-XSS-Protection "1; mode=block" always;

    # 禁止浏览器 "嗅探" MIME 类型(例如把 .txt 当作 JS 执行), 防止 MIME 混淆攻击
    add_header X-Content-Type-Options "nosniff" always;

    # 控制 Referer 头的发送策略, 防止敏感信息泄露
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # 开启高效文件传输模式
    tcp_nopush on;
    tcp_nodelay on;

    # 客户端请求体缓冲区设置
    client_body_buffer_size 16k;
    client_header_buffer_size 1k;
    large_client_header_buffers 4 4k;

    # 旧网址重定向映射(map 在请求匹配时按需查表, 不影响性能)
    # 通配符 include 使 redirects.map 文件可选, 不存在时 nginx 不会报错
    map $uri $redirect_uri {
        default "";
        include /etc/nginx/redirects*.map;
    }

    # web 服务器
    server {
        # 监听 IPv4 HTTP 端口
        listen 80;

        # 监听 IPv6 HTTP 端口
        listen [::]:80;

        # 设置服务器名称
        server_name jiaopengzi.com;

        # 设置编码
        charset utf-8;

        # 将所有 HTTP 请求重定向到 HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        # 监听 IPv4 HTTPS 端口
        listen 443 ssl;

        # 监听 IPv6 HTTPS 端口
        listen [::]:443 ssl;

        # 启用 HTTP/2
        http2 on;

        # 设置服务器名称
        server_name jiaopengzi.com;

        # 设置编码
        charset utf-8;

        # SSL 证书路径和密钥路径
        ssl_certificate /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/cert.key;

        # 仅允许安全的 TLS 协议版本
        ssl_protocols TLSv1.2 TLSv1.3;

        # 使用现代、安全的加密套件
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;

        # 不强制使用服务器端首选加密套件
        ssl_prefer_server_ciphers off;

        # 共享 SSL 会话缓存, 提升性能
        ssl_session_cache shared:SSL:10m;

        # 设置 SSL 会话超时时间为 10 分钟
        ssl_session_timeout 10m;

        # 旧网址 301 重定向(匹配 redirects.map 中的映射)
        if ($redirect_uri != "") {
            return 301 $redirect_uri;
        }

        # 代理到后端服务的 sitemap 接口
        location /sitemap {
            # 直接代理到后端服务
            proxy_pass http://blog-server:5426/api/v1/sitemap;

            # 复用 proxy 设置
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Connection "";
            # 不走缓存
            add_header Cache-Control "no-store, no-cache, must-revalidate";
        }
        
        # 添加 Nginx 健康状态检查端点
        location = /nginx-health {
            # 关闭健康检查日志
            access_log off;

            # add_header 必须在 return 之前, 否则部分 nginx 版本不生效
            add_header Content-Type text/plain;

            # 返回健康状态
            return 200 "healthy\n";
        }

        # === 缓存策略开始 ===

        # 单文件, HTML 不缓存: 每次请求必须向服务器验证(支持 304 Not Modified), 保证 SPA 部署后用户立即获取最新入口
        # 不存在的 .html 文件(如 WordPress 旧链接 /123.html)回退到 SPA 入口, 由 Vue Router 展示 404 页面
        location ~* \.html$ {
            root /usr/share/nginx/html;
            try_files $uri /index.html;
            expires -1;
            add_header Cache-Control "no-cache";
        }

        # 缓存根指定目录(static|assets)下的静态资源文件一年，同时匹配根目录下的 .ico .svg文件
        location ~* ^/(?:(?:static|assets)/.*\.(?:js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp|avif|mp4|webm|pdf)|[^/]+\.(ico|svg))$ {
            root /usr/share/nginx/html;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # API 中的上传的静态资源缓存一年
        location ~* ^/api/(v1/)?(uploads)/.+\.(png|jpg|jpeg|gif|ico|webp|svg|pdf|mp4|webm|ts)$ {
            proxy_pass http://blog-server:5426;

            # 复用 proxy 设置
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Connection "";

            expires 1y;
            add_header Cache-Control "public, immutable";
        }
        # === 缓存策略结束 ===

        # 前端单页应用配置
        location / {
            root /usr/share/nginx/html;
            index index.html index.htm;

            # 在找不到请求的资源时返回单页应用的入口 HTML 文件
            try_files $uri $uri/ /index.html;
        }

        # 后端服务配置
        location /api/ {
            # 使用 docker 服务名称(需在同一自定义网络下, 否则应替换为宿主机内网 IP)
            proxy_pass http://blog-server:5426/api/;

            # 设置 HTTP 版本
            proxy_http_version 1.1;

            # 使用 keepalive 连接池, 减少连接建立开销
            proxy_set_header Connection "";

            # 设置升级头(用于 WebSocket 等)
            proxy_set_header Upgrade $http_upgrade;

            # 设置连接头
            proxy_set_header Connection "upgrade";

            # 设置主机头
            proxy_set_header Host $host;

            # 设置真实客户端 IP 头
            proxy_set_header X-Real-IP $remote_addr;

            # 设置转发链路中的客户端 IP 头
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # 设置代理读取超时时间(秒)
            proxy_read_timeout 120;

            # 设置代理连接超时时间(秒)
            proxy_connect_timeout 120;

            # 设置代理发送超时时间(秒)
            proxy_send_timeout 120;

            # 不走缓存
            add_header Cache-Control "no-store, no-cache, must-revalidate";
        }
    }
}
